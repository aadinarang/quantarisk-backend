# QuantaRisk Nginx reverse proxy configuration.
# Sits in front of the Blue/Green backend containers.
# Traffic switching is achieved by rewriting the upstream block
# and calling `nginx -s reload` — a graceful zero-downtime handover.

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Active backend upstream ───────────────────────────────────
    # This block is rewritten by the Jenkinsfile Traffic Switch stage.
    # Blue  container: port 8001
    # Green container: port 8002
    upstream quantarisk_backend {
        server 127.0.0.1:8001;   # default: blue slot
    }

    server {
        listen 80;
        server_name _;

        # ── API proxy ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://quantarisk_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Health check passthrough ──────────────────────────────
        location /api/health {
            proxy_pass         http://quantarisk_backend/api/health;
            proxy_http_version 1.1;
            access_log off;    # reduce log noise from pipeline health polling
        }

        # ── OpenAPI docs ──────────────────────────────────────────
        location /docs {
            proxy_pass http://quantarisk_backend/docs;
        }

        location /redoc {
            proxy_pass http://quantarisk_backend/redoc;
        }

        location /openapi.json {
            proxy_pass http://quantarisk_backend/openapi.json;
        }

        # ── Static React frontend (optional — serve from here) ────
        # Uncomment if you deploy the built React app alongside nginx.
        # location / {
        #     root   /var/www/quantarisk;
        #     index  index.html;
        #     try_files $uri $uri/ /index.html;
        # }
    }
}
